worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Cloudflare: recover the real client IP ───────────────────────────
    # When traffic arrives via Cloudflare, $remote_addr would otherwise be a
    # Cloudflare edge IP — collapsing every visitor onto ~a dozen source IPs and
    # making the auth rate-limit below fire globally. These directives trust the
    # CF-Connecting-IP header, but ONLY when the connection genuinely originates
    # from a Cloudflare range (so the header can't be spoofed by a direct hit).
    # Source of truth: https://www.cloudflare.com/ips-v4 / ips-v6 — keep in sync.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header    CF-Connecting-IP;
    real_ip_recursive on;

    # Keyed on $binary_remote_addr, which is now the true client IP (above), so a
    # brute-force on /api/auth/ rate-limits that one attacker — not all visitors.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    client_max_body_size 10M;

    # ── HTTP: ACME challenge + redirect to HTTPS ──────────────────────
    server {
        listen 80;
        server_name pharmcy.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name pharmcy.site;

        ssl_certificate     /etc/letsencrypt/live/pharmcy.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pharmcy.site/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        resolver 127.0.0.11 valid=30s ipv6=off;

        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            set $backend http://backend:5000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            set $backend http://backend:5000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            set $backend http://backend:5000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location ~* ^/(images|fonts)/ {
            set $frontend http://frontend:3000;
            proxy_pass $frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /_next/static/ {
            set $frontend http://frontend:3000;
            proxy_pass $frontend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            set $frontend http://frontend:3000;
            proxy_pass $frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
