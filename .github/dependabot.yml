version: 2
updates:
  # Backend npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch

  # Frontend npm packages
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      frontend-dependencies:
        update-types:
          - minor
          - patch

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - docker
      - dependencies

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels:
      - docker
      - dependencies

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
      - dependencies
