name: Deploy (ECS Fargate)

# Build → push to ECR → force a new ECS deployment.
#
# Manual-only (workflow_dispatch) for now: the app runs on the legacy EC2 +
# DuckDNS stack (cd.yml), and the ECS infra isn't deployed yet. Re-enable the
# `push` trigger once terraform/ecs-fargate is applied and a real domain is live.
#
# Prerequisites (one-time):
#   - terraform/ecs-fargate applied (cluster + services + ECR exist)
#   - AWS_ROLE_ARN secret (GitHub OIDC role) — see terraform/ecs-fargate/GITHUB_SECRETS.md
#   - Task definitions reference the `:latest` image tag (the tfvars default)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ecs-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: pharmalink-production
  BACKEND_REPO: pharmalink-backend
  FRONTEND_REPO: pharmalink-frontend
  BACKEND_SERVICE: pharmalink-production-backend
  FRONTEND_SERVICE: pharmalink-production-frontend
  DOMAIN: mymedcine.com
  # Public OAuth client id — baked into the frontend at build time.
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: "350366296907-uusg9qh2kh53r5kacjtp2kr7r0h4t7np.apps.googleusercontent.com"

jobs:
  # 1) Gate on the full CI suite (types, tests, audit, image build/scan)
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      security-events: write

  # 2) Build, push, and roll out
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    permissions:
      contents: read
      id-token: write # required for AWS OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        # ── Static-key alternative (remove the OIDC line above if you use this) ──
        # with:
        #   aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        #   aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        #   aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ env.DOMAIN }}/api
            NEXT_PUBLIC_SOCKET_URL=https://${{ env.DOMAIN }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ env.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Force new ECS deployments
        run: |
          for svc in "$BACKEND_SERVICE" "$FRONTEND_SERVICE"; do
            echo "→ forcing new deployment: $svc"
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$svc" \
              --force-new-deployment >/dev/null
          done

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$BACKEND_SERVICE" "$FRONTEND_SERVICE"
          echo "✅ Both services reached a steady state"

      - name: Post-deploy health check
        run: |
          for i in $(seq 1 12); do
            code=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN/api/health" || echo 000)
            if [ "$code" = "200" ]; then
              echo "✅ Production healthy (HTTP $code)"
              exit 0
            fi
            echo "attempt $i/12 — HTTP $code, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed — https://$DOMAIN/api/health never returned 200"
          exit 1
