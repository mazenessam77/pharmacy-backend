name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend — TypeScript compile check
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # 2. Frontend — TypeScript compile check
  # ─────────────────────────────────────────────
  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Use npm install (not ci) — frontend lockfile may be generated by
      # a newer npm version than the one shipping with Node 20
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: TypeScript compile check
        working-directory: ./frontend
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # 3. Tests (backend)
  # ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: backend-check

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 5000
      MONGODB_URI: mongodb://admin:testpass@localhost:27017/pharma_test?authSource=admin
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_test_access_secret_32chars_min
      JWT_REFRESH_SECRET: ci_test_refresh_secret_32chars_min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        # --passWithNoTests: don't fail if no test files exist yet
        run: npm test -- --passWithNoTests --forceExit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 4. Security — filesystem scan
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  # ─────────────────────────────────────────────
  # 5. Docker — build & scan both images
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [test, frontend-check, security]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: false
          load: true
          tags: pharma-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false
          load: true
          tags: pharma-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=https://placeholder.local/api
            NEXT_PUBLIC_SOCKET_URL=https://placeholder.local
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pharma-backend:ci
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
