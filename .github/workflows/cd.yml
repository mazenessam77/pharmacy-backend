name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Run full CI suite first
  # ─────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      security-events: write

  # ─────────────────────────────────────────────
  # 2. Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_HOST }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/pharma-app

            # Pull latest code
            git pull origin main

            # Rebuild only the app containers (not mongodb/redis/nginx which don't change)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend

            # Restart app containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d backend frontend

            # Reload nginx so it picks up new container IPs (prevents 502 after restart)
            docker exec pharma-nginx nginx -s reload

            # Clean up dangling images
            docker image prune -f

      # ─────────────────────────────────────────
      # 3. Health check — verify deployment
      # ─────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting for containers to be ready..."
          sleep 30

          for i in {1..8}; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
              https://${{ secrets.PRODUCTION_HOST }}/api/health || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "✓ Production healthy (HTTP $STATUS)"
              exit 0
            fi

            echo "Attempt $i/8 — HTTP $STATUS, retrying in 15s..."
            sleep 15
          done

          echo "::error::Health check failed after 8 attempts. Check logs:"
          echo "::error::  ssh ubuntu@${{ secrets.PRODUCTION_HOST }} 'cd /opt/pharma-app && docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50'"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed. To roll back:"
          echo "::error::  ssh ubuntu@${{ secrets.PRODUCTION_HOST }} 'cd /opt/pharma-app && git checkout HEAD~1 && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build backend frontend'"
