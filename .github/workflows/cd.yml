name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Run full CI suite first
  # ─────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      security-events: write

  # ─────────────────────────────────────────────
  # 2. Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/pharma-app

            # Discard any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main

            # ── SSL: Install certbot if missing ──────────────────────
            if ! command -v certbot &>/dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y certbot
            fi

            mkdir -p nginx/certbot/www

            # ── SSL: Issue cert if it doesn't exist yet ───────────────
            if [ ! -f /etc/letsencrypt/live/mymedcine.duckdns.org/fullchain.pem ]; then
              echo "No cert found — obtaining Let's Encrypt cert..."
              docker stop pharma-nginx 2>/dev/null || true
              sudo certbot certonly --standalone \
                -d mymedcine.duckdns.org \
                --agree-tos \
                --non-interactive \
                -m admin@mymedcine.duckdns.org
              echo "Cert obtained successfully"
            fi

            # ── SSL: Renew if within 30 days of expiry ────────────────
            sudo certbot renew --quiet \
              --pre-hook "docker stop pharma-nginx 2>/dev/null || true" \
              --post-hook "docker start pharma-nginx 2>/dev/null || true" \
              2>/dev/null || true

            # Rebuild only the app containers (not mongodb/redis/nginx which don't change)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend

            # Restart app containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d backend frontend

            # Wait for backend to be healthy BEFORE reloading nginx.
            # Nginx reloads 1s after container start → marks upstream failed → 502.
            # Polling /health inside the container avoids that race condition.
            echo "Waiting for backend to be ready..."
            for i in $(seq 1 24); do
              if docker exec pharma-backend wget -qO- http://localhost:5000/health > /dev/null 2>&1; then
                echo "Backend healthy after $((i * 5))s"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "--- backend logs (last 60 lines) ---"
                docker logs pharma-backend --tail=60
                echo "Backend did not become healthy within 120s"
                exit 1
              fi
              sleep 5
            done

            # Wait for frontend (Next.js takes a bit longer)
            echo "Waiting for frontend to be ready..."
            for i in $(seq 1 12); do
              if docker exec pharma-frontend wget -qO- http://localhost:3000 > /dev/null 2>&1; then
                echo "Frontend healthy after $((i * 5))s"
                break
              fi
              sleep 5
            done

            # Now reload nginx — both upstreams are alive, no 502 window
            docker exec pharma-nginx nginx -s reload

            # Clean up dangling images
            docker image prune -f

      # ─────────────────────────────────────────
      # 3. Health check — verify deployment
      # ─────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting for nginx to propagate..."
          sleep 10

          for i in {1..12}; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
              https://mymedcine.duckdns.org/api/health || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "✓ Production healthy (HTTP $STATUS)"
              exit 0
            fi

            echo "Attempt $i/12 — HTTP $STATUS, retrying in 15s..."
            sleep 15
          done

          echo "::error::Health check failed after 12 attempts. Check logs:"
          echo "::error::  ssh ubuntu@${{ secrets.PRODUCTION_HOST }} 'cd /opt/pharma-app && docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50'"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed. To roll back:"
          echo "::error::  ssh ubuntu@${{ secrets.PRODUCTION_HOST }} 'cd /opt/pharma-app && git checkout HEAD~1 && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build backend frontend'"
