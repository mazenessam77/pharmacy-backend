name: CD — Deploy to Production (pharmcy.site)

# Deploys the Docker Compose stack to the EC2 box on push to main (and manual
# dispatch) via AWS SSM Run Command — no inbound SSH (port 22) required.
#
# ── One-time setup required (see PR description / ops notes) ──────────────
#   AWS:
#     • Attach an instance profile with the AmazonSSMManagedInstanceCore policy
#       to the EC2 instance, and confirm it registers:
#         aws ssm describe-instance-information
#     • Create a GitHub OIDC provider + an IAM role this workflow can assume,
#       allowing ssm:SendCommand + ssm:GetCommandInvocation on the instance.
#   GitHub repo secrets:
#     • AWS_DEPLOY_ROLE_ARN  – the IAM role ARN to assume via OIDC
#     • EC2_INSTANCE_ID      – e.g. i-0abc123...
#   GitHub repo variable (optional, defaults to eu-west-2):
#     • AWS_REGION
#   The old SSH secrets (PRODUCTION_HOST / PRODUCTION_USER / PRODUCTION_SSH_KEY)
#   are no longer used and can be deleted.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC federation to AWS

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production (EC2 via SSM)
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
      INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM Run Command
        run: |
          set -euo pipefail

          # Bootstrap executed on the box (as root). NOTE: SSM AWS-RunShellScript
          # runs this via /bin/sh (dash), so keep it POSIX — no `pipefail`. The
          # heavy logic in scripts/deploy.sh is run with `bash` below.
          SCRIPT="$(cat <<'EOS'
          set -eu
          export HOME=/root
          export DEBIAN_FRONTEND=noninteractive
          cd /opt/pharma-app
          git config --global --add safe.directory /opt/pharma-app
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh
          EOS
          )"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "CD deploy ${GITHUB_SHA::7}" \
            --parameters "$(jq -n --arg c "$SCRIPT" '{commands: ($c | split("\n")), executionTimeout: ["3600"]}')" \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD_ID"

          # Poll until the command reaches a terminal state (~25 min ceiling).
          for i in $(seq 1 150); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success)
                break ;;
              Failed|Cancelled|TimedOut)
                echo "::group::deploy stderr"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text || true
                echo "::endgroup::"
                echo "::error::SSM deploy ended with status: $STATUS"
                exit 1 ;;
            esac
            if [ "$i" -eq 150 ]; then echo "::error::Timed out waiting for SSM command"; exit 1; fi
            sleep 10
          done

          echo "::group::deploy stdout (tail)"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text || true
          echo "::endgroup::"

      - name: Health check
        run: |
          echo "Waiting for nginx to propagate..."
          sleep 10
          for i in {1..12}; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://pharmcy.site/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Production healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed after 12 attempts."
          exit 1

      - name: Rollback hint on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. Roll back via SSM Session Manager on the box:"
          echo "::error::  cd /opt/pharma-app && git checkout HEAD~1 && bash scripts/deploy.sh"
