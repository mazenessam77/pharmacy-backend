name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Run CI first (lint, test, security, docker)
  # ─────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      security-events: write

  # ─────────────────────────────────────────────
  # 2. Deploy to EC2 (all services)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_HOST }}

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/pharma-app
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f

      - name: Health check
        run: |
          sleep 20
          for i in {1..6}; do
            status=$(curl -sk -o /dev/null -w "%{http_code}" https://${{ secrets.PRODUCTION_HOST }}/api/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "Production is healthy"
              exit 0
            fi
            echo "Attempt $i/6: status=$status, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 6 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Production deployment failed! SSH into EC2 and check: docker compose logs"
