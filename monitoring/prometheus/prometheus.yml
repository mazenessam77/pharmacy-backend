global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: pharma

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Server A (the monitoring box itself) ──
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: monitor-host
    static_configs:
      - targets: ['node-exporter:9100']
        labels: { server: A }

  # ── Server B (app host) — private VPC IP, gated by the monitor SG ──
  - job_name: node-b               # Phase 2
    static_configs:
      - targets: ['10.0.1.222:9100']
        labels: { server: B }

  # Added in later phases:
  # - job_name: cadvisor-b   → 10.0.1.222:8080   (Phase 3)
  # - job_name: mongodb-b    → 10.0.1.222:9216   (Phase 4)
  # - job_name: redis-b      → 10.0.1.222:9121   (Phase 4)
  # - job_name: backend-b    → 10.0.1.222:9101 /metrics  (Phase 5)
  # - job_name: nginx-b      → 10.0.1.222:9113   (Phase 6)
