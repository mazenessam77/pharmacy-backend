version: '3.8'

services:
  mongodb:
    # Published ONLY on the EC2 private VPC interface (never 0.0.0.0) so the
    # prescription-processor Lambda can reach it over the VPC. Ingress on
    # 27017 is gated by the security group (source = the Lambda's SG only).
    ports: !override
      - "10.0.1.222:27017:27017"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports: !override []
    environment:
      NODE_ENV: production
      FRONTEND_URL: https://pharmcy.site
      GOOGLE_CLIENT_ID: 350366296907-uusg9qh2kh53r5kacjtp2kr7r0h4t7np.apps.googleusercontent.com
    volumes: []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://pharmcy.site/api
        NEXT_PUBLIC_SOCKET_URL: https://pharmcy.site
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: 350366296907-uusg9qh2kh53r5kacjtp2kr7r0h4t7np.apps.googleusercontent.com
    ports: !override []
    volumes: []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: pharma-nginx
    restart: unless-stopped
    ports: !override
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pharma-network
