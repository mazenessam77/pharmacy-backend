version: '3.8'

services:
  mongodb:
    ports: []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    ports: []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports: []
    environment:
      NODE_ENV: production
      FRONTEND_URL: https://mymedcine.duckdns.org
    volumes: []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://mymedcine.duckdns.org/api
        NEXT_PUBLIC_SOCKET_URL: https://mymedcine.duckdns.org
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    ports: []
    volumes: []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: pharma-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pharma-network
