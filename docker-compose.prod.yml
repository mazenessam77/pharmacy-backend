version: '3.8'

services:
  mongodb:
    # No published ports: the Rx-processing Lambda that needed VPC access to
    # 27017 was retired 2026-07-02, so only containers on the compose network
    # may reach Mongo. (The matching Lambda-SG ingress rule should be deleted
    # in AWS as part of the Rx-pipeline teardown.)
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports: !override []
    environment:
      NODE_ENV: production
      FRONTEND_URL: https://pharmcy.site
      GOOGLE_CLIENT_ID: 350366296907-uusg9qh2kh53r5kacjtp2kr7r0h4t7np.apps.googleusercontent.com
    volumes: []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://pharmcy.site/api
        NEXT_PUBLIC_SOCKET_URL: https://pharmcy.site
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: 350366296907-uusg9qh2kh53r5kacjtp2kr7r0h4t7np.apps.googleusercontent.com
    ports: !override []
    volumes: []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: pharma-nginx
    restart: unless-stopped
    ports: !override
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pharma-network
